apiVersion: v1
kind: ConfigMap
metadata:
  name: security-nginx-config
data:
  default.conf: |
    server {
        listen 80;

        server_name localhost;

        location / {
            proxy_pass http://127.0.0.1:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
---
apiVersion: v1
kind: Pod
metadata:
  name: security-cluster-pod
  labels:
    app: security-container
spec:
  containers:
    - name: nginx
      image: nginx:latest
      ports:
        - containerPort: 80
      volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf

    - name: security-app
      image: arinamarikyn/security-app:1.0
      imagePullPolicy: IfNotPresent
      ports:
        - containerPort: 8000
      env:
        - name: POSTGRES_DB
          value: security_db
        - name: POSTGRES_USER
          value: security_user
        - name: POSTGRES_PASSWORD
          value: security_password
        - name: POSTGRES_HOST
          value: "127.0.0.1"
        - name: POSTGRES_PORT
          value: "5432"

    - name: postgres
      image: postgres:16
      ports:
        - containerPort: 5432
      env:
        - name: POSTGRES_DB
          value: security_db
        - name: POSTGRES_USER
          value: security_user
        - name: POSTGRES_PASSWORD
          value: security_password
      volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data

    - name: pgadmin
      image: dpage/pgadmin4:latest
      ports:
        - containerPort: 5050
      env:
        - name: PGADMIN_DEFAULT_EMAIL
          value: admin@example.com
        - name: PGADMIN_DEFAULT_PASSWORD
          value: admin123
        - name: PGADMIN_LISTEN_PORT
          value: "5050"

  volumes:
    - name: nginx-config
      configMap:
        name: security-nginx-config
    - name: postgres-data
      emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: security-service
spec:
  type: NodePort
  selector:
    app: security-container
  ports:
    - name: nginx
      port: 80
      targetPort: 80
      nodePort: 30080
    - name: pgadmin
      port: 5050
      targetPort: 5050
      nodePort: 30500